    "ethtool" "net-tools" "wget" "curl" "rsync" "openssh" "snapper" "snap-pac" 
    "grub-btrfs" "pacman-contrib" "zsh" "zsh-completions" "zsh-autosuggestions" 
    "zsh-syntax-highlighting" "vi" "nano" "fastfetch" "git" "xdg-user-dirs" 
